    <!-- ===== Structured Data – WebSite with SearchAction ===== -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "ExamSarkar",
      "alternateName": "Exam Sarkar",
      "url": "https://www.examsarkar.com/",
      "description": "India's leading free platform for UPSC, IAS, SSC, and government exam preparation with daily quizzes and mock tests.",
      "inLanguage": "en-IN",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://www.examsarkar.com/test-series?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

      "name": "ExamSarkar",

        "https://www.facebook.com/examsarkar"
      ],
