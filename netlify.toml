# Netlify configuration for ExamSarkar
[build]
  command = "npm install --prefix netlify/functions && npm run build"
  functions = "netlify/functions"
  publish = "build"

[[plugins]]
  package = "@netlify/plugin-functions-install-core"

[context.development.environment]
  REACT_APP_BACKEND_URL = "http://localhost:5000"

[context.deploy-preview.environment]
  REACT_APP_BACKEND_URL = "/api"

[context.production.environment]
  REACT_APP_BACKEND_URL = "/api"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/asset-manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Redirect all API calls to serverless functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# SPA routing - redirect all non-asset requests to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
